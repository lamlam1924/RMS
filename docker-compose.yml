version: "3.9"

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: rms-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Password123!"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Password123! -C -Q 'SELECT 1' || exit 1"]
      interval: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: rms-db-init
    depends_on:
      mssql:
        condition: service_healthy
    volumes:
      - ./Backend/RMS_DB:/init-scripts
    entrypoint: /bin/bash
    command: /init-scripts/entrypoint.sh

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: rms-be
    environment:
      - ConnectionStrings__DefaultConnection=Server=mssql;Database=RecruitmentDB;User Id=sa;Password=Password123!;TrustServerCertificate=True
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8080:8080"
    depends_on:
      mssql:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rms-fe
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mssql_data:
